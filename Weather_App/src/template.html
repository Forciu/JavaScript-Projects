<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weather App</title>
    <script src="main.js" type="module"></script>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
<div class="container">
    <h1 class="flex flex-center">TOP Weather App</h1>
    <div class="search-container flex flex-center">
        <div class="search-box flex">
            <div class="search-input flex">
                <label for="city-input"></label>
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                     stroke="currentColor" class="icon-sm">
                    <path stroke-linecap="round" stroke-linejoin="round"
                          d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z"/>
                </svg>
                <input id="city-input" type="text" placeholder="Enter city/country name">
            </div>
            <button id="search-button">Search</button>
        </div>
        <div class="current-weather-container">
            <button id="current-weather-button">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                     stroke="currentColor" class="icon-sm">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/>
                    <path stroke-linecap="round" stroke-linejoin="round"
                          d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0Z"/>
                </svg>
                Current Location Weather
            </button>
        </div>
    </div>
    <div class="main-menu">
        <div class="current-time flex flex-column flex-center">
            <p id="selected-city"></p>
            <p id="current-date-data"></p>
        </div>
        <div class="current-weather flex flex-center flex-column">
        </div>
        <div class="next-days"></div>
    </div>
</div>
</body>
</html>
